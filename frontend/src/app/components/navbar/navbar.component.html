<p-menubar [model]="items">
  <ng-template pTemplate="start">
    <img src="assets/images/logo.webp" alt="Nehli" class="navbar-logo" routerLink="/browser" />
  </ng-template>
  <ng-template pTemplate="end">
    <button
      pButton
      label="Salir"
      icon="pi pi-sign-out"
      class="btn-logout"
      (click)="logout()">
    </button>
  </ng-template>
</p-menubar>
