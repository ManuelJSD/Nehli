<article class="anime-card">
  <!-- Imagen -->
  <div class="card-media">
    <img [src]="data.imagen" [alt]="data.titulo" class="card-image" loading="lazy">
    <div class="card-overlay"></div>
  </div>

  <!-- Info -->
  <div class="card-body">
    <h3 class="card-title">{{ data.titulo }}</h3>

    <div class="card-meta">
      <div class="meta-item">
        <i class="pi pi-video"></i>
        <span>{{ data.episodios ?? '?' }} eps</span>
      </div>
      <div class="meta-item meta-score" *ngIf="data.puntuacion">
        <i class="pi pi-star-fill"></i>
        <span>{{ data.puntuacion }}</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <a [href]="data.url" target="_blank" rel="noopener noreferrer" class="card-link">
      <i class="pi pi-external-link"></i>
      <span>Ver más</span>
    </a>
  </div>
</article>
