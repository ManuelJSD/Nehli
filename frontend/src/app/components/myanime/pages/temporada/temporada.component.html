<!-- Estado de carga -->
<div class="neh-loading" *ngIf="isLoading">
  <div class="neh-loading-content">
    <p-progressSpinner styleClass="w-4rem h-4rem" strokeWidth="6" fill="transparent" animationDuration="1s"></p-progressSpinner>
    <p class="neh-loading-text">Cargando temporadas...</p>
  </div>
</div>

<!-- Estado de error -->
<div *ngIf="isError" class="neh-page" style="padding-top: 2rem;">
  <p-messages [value]="messages" [enableService]="false" [closable]="false"></p-messages>
</div>

<!-- Contenido -->
<div class="neh-page anime-page" *ngIf="!isLoading">
  <header class="page-header">
    <h1 class="neh-page-title">Temporadas de Anime</h1>
    <p class="neh-page-subtitle">Explora los animes por temporada y año</p>
  </header>

  <!-- Controles -->
  <div class="controls-bar">
    <div class="control-group">
      <label for="anio-dropdown" class="control-label">
        <i class="pi pi-calendar"></i>
        Año
      </label>
      <p-dropdown id="anio-dropdown" [options]="anios" (onChange)="obtenerAnimes()" [(ngModel)]="anioSeleccionado" styleClass="neh-dropdown"></p-dropdown>
    </div>

    <div class="season-buttons">
      <button pButton pRipple (click)="recibirTemp('winter')" class="season-btn season-winter"
        [class.active]="temporada === 'winter'">
        <i class="pi pi-cloud"></i> Invierno
      </button>
      <button pButton pRipple (click)="recibirTemp('spring')" class="season-btn season-spring"
        [class.active]="temporada === 'spring'">
        <i class="pi pi-sun"></i> Primavera
      </button>
      <button pButton pRipple (click)="recibirTemp('summer')" class="season-btn season-summer"
        [class.active]="temporada === 'summer'">
        <i class="pi pi-bolt"></i> Verano
      </button>
      <button pButton pRipple (click)="recibirTemp('fall')" class="season-btn season-fall"
        [class.active]="temporada === 'fall'">
        <i class="pi pi-palette"></i> Otoño
      </button>
    </div>
  </div>

  <!-- Subtítulo dinámico -->
  <div class="neh-section-header" *ngIf="Temporadas.length > 0" style="margin-top: 2rem;">
    <div class="neh-section-accent"></div>
    <h2 class="neh-section-title">{{ temporada | titlecase }} {{ anioActual }}</h2>
    <span class="neh-badge">{{ Temporadas.length }} animes</span>
  </div>

  <!-- Grid -->
  <div class="anime-grid">
    <div class="anime-grid-item" *ngFor="let temp of Temporadas">
      <app-tarjetas
        [data]="{
          imagen: temp.images['jpg'].image_url,
          titulo: temp.title,
          episodios: temp.episodes,
          puntuacion: temp.score,
          url: temp.url
        }">
      </app-tarjetas>
    </div>
  </div>
</div>
