<div class="neh-page anime-page">
  <!-- Header -->
  <header class="page-header">
    <h1 class="neh-page-title">50 Animes más Populares</h1>
    <p class="neh-page-subtitle">Ranking de los animes más populares según MyAnimeList</p>
  </header>

  <!-- Grid de tarjetas -->
  <div class="anime-grid">
    <div class="anime-grid-item" *ngFor="let popular of populares; trackBy: trackByTitle">
      <app-tarjetas
        [data]="{
          imagen: popular.images['jpg'].image_url,
          titulo: popular.title,
          episodios: popular.episodes,
          puntuacion: popular.score,
          url: popular.url
        }">
      </app-tarjetas>
    </div>
  </div>
</div>
